name: Release (op5e)

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: op5e/package-lock.json

      - name: Install deps
        working-directory: op5e
        run: npm ci

      - name: Build
        working-directory: op5e
        run: npm run clean && npm run build

      - name: Package (release manifest)
        working-directory: op5e
        env:
          RELEASE: "true"
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: npm run package

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            op5e/dist/op5e.zip
            op5e/dist/module.json
